<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavini & Anmol — June 2026 | Wedding Invitation</title>
    <meta name="description" content="Join us in celebrating the wedding of Bhavini & Anmol on June 23-24, 2026 at the Radisson Blu Hotel, Amritsar.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Petals Canvas -->
    <canvas id="petals-canvas"></canvas>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
        <img src="" alt="" class="lightbox-img" id="lightbox-img">
    </div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-logo">Bhavs <span class="nav-ampersand">&</span> Mau</div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-parallax-bg" id="heroBg"></div>
        <div class="hero-overlay"></div>

        <!-- Floating Decorative Elements -->
        <!-- <div class="deco-ring deco-ring-1"></div>
        <div class="deco-ring deco-ring-2"></div>
        <div class="deco-ring deco-ring-3"></div> -->

        <div class="hero-content">
            <p class="hero-eyebrow scroll-reveal">We invite you to celebrate</p>
            <h1 class="hero-names">
                <span class="name-bride">Bhavini</span>
                <span class="hero-amp">&amp;</span>
                <span class="name-groom">Anmol</span>
            </h1>
            <div class="hero-divider">
                <span class="divider-line"></span>
                <span class="divider-icon">✦</span>
                <span class="divider-line"></span>
            </div>
            <p class="hero-date">June 23 - 24, 2026</p>
            <p class="hero-location">Amritsar, Punjab, India</p>
        </div>
    </section>

    <script src="script.js?v=2"></script>
</body>
</html>
